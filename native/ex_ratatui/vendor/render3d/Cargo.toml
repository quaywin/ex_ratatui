[package]
name = "render3d"
version = "0.1.0"
edition = "2021"
description = "3D software renderer engine"
license = "MIT"
repository = "https://github.com/limlabs/ratatui-3d"

[dependencies]
glam = "0.29"
tobj = { version = "4", default-features = false, optional = true }
gltf = { version = "1.4", default-features = false, optional = true, features = ["import", "utils", "names"] }
wgpu = { version = "24", optional = true }
pollster = { version = "0.4", optional = true }
bytemuck = { version = "1", features = ["derive"], optional = true }

# Vendored into ex_ratatui. The obj/gltf/gpu features are intentionally OFF by
# default: model loading and the wgpu pipeline are out of scope and the GPU path
# is unsafe inside a NIF. See vendor/README.md for provenance.
[features]
default = []
obj = ["dep:tobj"]
gltf = ["dep:gltf"]
gpu = ["dep:wgpu", "dep:pollster", "dep:bytemuck"]
