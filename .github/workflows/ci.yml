name: CI

on:
  pull_request:
  push:

jobs:
  main:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    env:
      EX_RATATUI_BUILD: "true"

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.19"
            erlang: "28.2"
            lint: true
          - elixir: "1.18"
            erlang: "27.3.4.6"
          - elixir: "1.17"
            erlang: "26.2.5.16"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        if: ${{ ! matrix.lint }}
        with:
          path: |
            _build
            deps
          key: ${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.erlang }}-${{ hashFiles('mix.lock') }}

      - uses: actions/cache@v5
        if: ${{ matrix.lint }}
        with:
          path: plts
          key: ${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.erlang }}-${{ hashFiles('mix.lock') }}-plt

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/ex_ratatui/target
          key: cargo-${{ runner.os }}-${{ hashFiles('native/ex_ratatui/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.erlang }}
          elixir-version: ${{ matrix.elixir }}

      - uses: dtolnay/rust-toolchain@stable

      - run: mix deps.get --check-locked

      - run: mix format --check-formatted
        if: ${{ matrix.lint }}

      - run: mix deps.unlock --check-unused
        if: ${{ matrix.lint }}

      - run: mix compile --warnings-as-errors

      - run: mix dialyzer --format github
        if: ${{ matrix.lint }}

      - run: mix rust.check
        if: ${{ matrix.lint }}

      - name: Run cargo tests
        if: ${{ ! matrix.lint }}
        run: cargo test --manifest-path native/ex_ratatui/Cargo.toml

      - run: mix test --cover
        if: ${{ matrix.lint }}

      - run: mix test
        if: ${{ ! matrix.lint }}
