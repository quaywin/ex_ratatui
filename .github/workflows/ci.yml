name: CI

on:
  pull_request:
  push:

jobs:
  main:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    env:
      EX_RATATUI_BUILD: "true"

    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.20"
            erlang: "28.5"
            lint: true
          - elixir: "1.19"
            erlang: "28.2"
          - elixir: "1.18"
            erlang: "27.3.4.6"
          - elixir: "1.17"
            erlang: "26.2.5.16"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v5
        if: ${{ ! matrix.lint }}
        with:
          path: |
            _build
            deps
          key: ${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.erlang }}-${{ hashFiles('mix.lock') }}

      - uses: actions/cache@v5
        if: ${{ matrix.lint }}
        with:
          path: plts
          key: ${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.erlang }}-${{ hashFiles('mix.lock') }}-plt

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/ex_ratatui/target
          key: cargo-${{ runner.os }}-${{ hashFiles('native/ex_ratatui/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.erlang }}
          elixir-version: ${{ matrix.elixir }}

      - uses: dtolnay/rust-toolchain@stable

      - run: mix deps.get --check-locked

      - run: mix format --check-formatted
        if: ${{ matrix.lint }}

      - run: mix deps.unlock --check-unused
        if: ${{ matrix.lint }}

      - run: mix credo --strict
        if: ${{ matrix.lint }}

      - run: mix compile --warnings-as-errors

      - run: mix xref graph --format cycles --fail-above 0
        if: ${{ matrix.lint }}

      - run: mix dialyzer --format github
        if: ${{ matrix.lint }}

      - run: mix rust.check
        if: ${{ matrix.lint }}

      - name: Run cargo tests
        if: ${{ ! matrix.lint }}
        # Run with no controlling terminal and no TERM so the SessionResource
        # tests fail loudly if anything in the session path ever queries the
        # host tty. A session is decoupled from the OS terminal. !uerying it
        # (e.g. crossterm's `terminal::size()`) fails off a tty, which is exactly
        # the regression `FixedSizeBackend` guards against in src/session.rs.
        # The pieces: `setsid -w` drops the controlling tty (so crossterm can't
        # open /dev/tty) and waits to propagate the exit code; stdin from /dev/null
        # and unset TERM defeat the remaining fallbacks (stdout ioctl on a pipe,
        # then `tput cols`/`tput lines`).
        run: env -u TERM setsid -w cargo test --manifest-path native/ex_ratatui/Cargo.toml < /dev/null

      - run: mix test --cover
        if: ${{ matrix.lint }}

      - run: mix test
        if: ${{ ! matrix.lint }}

  extras:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    env:
      EX_RATATUI_BUILD: "true"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v5
        with:
          path: |
            _build
            deps
          key: ${{ runner.os }}-extras-1.20-28.5-${{ hashFiles('mix.lock') }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/ex_ratatui/target
          key: cargo-${{ runner.os }}-${{ hashFiles('native/ex_ratatui/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.5"
          elixir-version: "1.20"

      - uses: dtolnay/rust-toolchain@stable

      - run: mix deps.get --check-locked

      - run: mix compile --warnings-as-errors

      - name: Run distributed tests
        run: elixir --sname test -S mix test --only distributed

      - name: Run slow tests
        run: mix test --only slow
