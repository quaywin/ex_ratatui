name: Build precompiled NIFs

on:
  push:
    tags:
      - "v*"

jobs:
  build_release:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        nif: ["2.17", "2.16"]
        job:
          - { target: arm-unknown-linux-gnueabihf,  os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-unknown-linux-gnu,    os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-unknown-linux-musl,   os: ubuntu-22.04, use-cross: true }
          - { target: riscv64gc-unknown-linux-gnu,  os: ubuntu-22.04, use-cross: true }
          - { target: x86_64-unknown-linux-gnu,     os: ubuntu-22.04 }
          - { target: x86_64-unknown-linux-musl,    os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-apple-darwin,         os: macos-15 }
          - { target: x86_64-apple-darwin,          os: macos-15 }
          - { target: x86_64-pc-windows-gnu,        os: windows-2025 }
          - { target: x86_64-pc-windows-msvc,       os: windows-2025 }

    steps:
      - uses: actions/checkout@v7

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1 | tr -d '\r')" >> $GITHUB_ENV

      - name: Add Rust target
        shell: bash
        run: rustup target add ${{ matrix.job.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v0-precomp
          shared-key: ${{ matrix.job.target }}-${{ matrix.nif }}
          workspaces: native/ex_ratatui

      - name: Build the project
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.5
        with:
          project-name: ex_ratatui
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross }}
          cross-version: ${{ matrix.job.cross-version || 'from-source' }}
          project-dir: "native/ex_ratatui"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

  publish:
    name: Publish release
    needs: build_release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish archives and packages
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
